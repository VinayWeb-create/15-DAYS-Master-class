<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Login | 15-Day Masterclass</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --secondary: #8b5cf6;
            --surface: rgba(30, 41, 59, 0.7);
            --background: #020617;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Inter', sans-serif;
        }

        body {
            background: var(--background);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            padding: 56px;
            border-radius: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .login-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 32px;
            box-shadow: 0 10px 20px -5px var(--primary-glow);
        }

        .login-card h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .login-card p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            opacity: 0.6;
        }

        .form-group input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.03);
            color: white;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px -5px var(--primary-glow);
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            background: #fff1f2;
            border: 1px solid #fecaca;
            color: #be123c;
            padding: 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-msg.show {
            display: flex;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 32px;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="login-card" id="login-card">
        <div class="login-icon">🔐</div>
        <h1>Admin Access</h1>
        <p>Restricted area. Please enter your instructor credentials to continue.</p>

        <div class="error-msg" id="error-msg">
            <span>❌</span> <span id="error-text">Invalid username or password.</span>
        </div>

        <div class="form-group">
            <label>Username</label>
            <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" id="admin-username" placeholder="Enter admin username" autocomplete="username">
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
                <span class="input-icon">🔑</span>
                <input type="password" id="admin-password" placeholder="Enter password" autocomplete="current-password">
            </div>
        </div>

        <button class="login-btn" id="login-btn" onclick="attemptLogin()">Sign In to Dashboard</button>

        <a href="index.html" class="back-link">← Back to Student Portal</a>
    </div>

    <script>
        const API_BASE = '/api';

        // ── Theme Logic ──
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        initTheme();

        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('admin-password').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });
        document.getElementById('admin-username').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });

        async function attemptLogin() {
            const username = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            const card = document.getElementById('login-card');
            const btn = document.getElementById('login-btn');

            if (!username || !password) {
                errorText.innerText = 'Please enter both username and password.';
                errorMsg.classList.add('show');
                return;
            }

            btn.innerText = 'Signing in...';
            btn.disabled = true;
            errorMsg.classList.remove('show');

            try {
                const res = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    btn.innerText = 'Redirecting... ✓';
                    btn.style.background = '#10b981';
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
                } else {
                    errorText.innerText = data.error || 'Invalid username or password.';
                    errorMsg.classList.add('show');
                    card.classList.remove('shake');
                    void card.offsetWidth;
                    card.classList.add('shake');
                    btn.innerText = 'Sign In to Dashboard';
                    btn.disabled = false;
                }
            } catch {
                errorText.innerText = '❌ Cannot connect to server. Make sure the backend is running.';
                errorMsg.classList.add('show');
                btn.innerText = 'Sign In to Dashboard';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
